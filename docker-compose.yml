version: "3.8"

services:
  app:
    build: .
    container_name: gaming-cafe-billing
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app/backend/data
    environment:
      - DATABASE_URL=sqlite:///./data/gaming_cafe.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - RECHARGE_BONUS_RATE=${RECHARGE_BONUS_RATE:-0.0}
    restart: unless-stopped

volumes:
  db-data:
