<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏主机计费管理系统</title>
    <link rel="stylesheet" href="css/style.css?v=2.0">
</head>
<body>
    <div id="app">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="6" width="20" height="12" rx="2"/>
                        <circle cx="8" cy="12" r="2"/>
                        <circle cx="16" cy="12" r="2"/>
                        <line x1="14" y1="10" x2="14" y2="14"/>
                        <line x1="12" y1="12" x2="16" y2="12"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <span class="logo-title">主机计费系统</span>
                    <span class="logo-sub">Gaming Billing</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#/dashboard" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    <span>计费大厅</span>
                </a>
                <a href="#/members" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    <span>会员管理</span>
                </a>
                <a href="#/bills" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                    <span>账单记录</span>
                </a>
                <a href="#/reports" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    <span>报表统计</span>
                </a>
                <a href="#/logs" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    <span>操作记录</span>
                </a>
                <a href="#/settings" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    <span>主机设置</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info" id="user-info"></div>
            </div>
        </aside>
        <main id="content">
            <header id="topbar">
                <div id="page-title"></div>
                <div id="topbar-actions"></div>
            </header>
            <div id="page-container"></div>
        </main>
    </div>

    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <div id="modal-header">
                <h3 id="modal-title"></h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/app.js?v=2.0"></script>
    <script src="js/components/modal.js?v=2.0"></script>
    <script src="js/components/toast.js?v=2.0"></script>
    <script src="js/components/table.js?v=2.0"></script>
    <script src="js/components/chart.js?v=2.0"></script>
    <script src="js/pages/dashboard.js?v=2.0"></script>
    <script src="js/pages/members.js?v=2.0"></script>
    <script src="js/pages/billing.js?v=2.0"></script>
    <script src="js/pages/reports.js?v=2.0"></script>
    <script src="js/pages/settings.js?v=2.0"></script>
    <script src="js/pages/logs.js?v=1.0"></script>
</body>
</html>
